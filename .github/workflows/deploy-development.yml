# dev 分支推送 → SSH 部署开发环境（PM2 + pnpm start:test）。
# Secrets：与生产共用 DEPLOY_HOST / DEPLOY_USER / DEPLOY_SSH_KEY
# 另需：
#   DEPLOY_PATH_DEV — 开发环境检出目录（跟踪 dev，可与生产同机不同目录）

name: Deploy development (SSH + PM2)

on:
  push:
    branches:
      - dev

concurrency:
  group: deploy-development
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy development
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            BRANCH="${DEPLOY_BRANCH_DEV:-dev}"
            cd "${{ secrets.DEPLOY_PATH_DEV }}"
            git fetch origin
            git checkout "$BRANCH"
            git pull origin "$BRANCH"
            bash scripts/server-deploy.sh fullstack-app-dev start:test
